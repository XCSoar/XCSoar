---
on:
  workflow_dispatch:
    inputs:
      ref:
        description: >
          Git branch, tag, or commit SHA to check out and build. Leave empty
          to build the ref selected in "Use workflow from" (same as before).
          For Play upload: a version tag (v* or refs/tags/v*) uses the production
          track; other refs use internal.
        required: false
        default: ''
        type: string
  push:
    paths-ignore:
      - '.clang-format'
      - '.cursor/**'
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      - 'ide/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-docs.yml'
      - '.github/workflows/build-unix.yml'
      - '.github/workflows/build-translation.yml'
      - '.readthedocs.yaml'
      - 'NEWS.txt'
      - 'AUTHORS'
      - 'README.md'
      - 'COPYING'
      - 'PRIVACY.md'
      - '.gitignore'
      - 'VERSION.txt'
    branches:
      - master
      - apple-testing
    tags:
      - 'v*'

  pull_request:
    paths-ignore:
      - '.clang-format'
      - '.cursor/**'
      - 'cloud/**'
      - 'doc/**'
      - 'fuzzer/**'
      - 'ide/**'
      - 'kobo/**'
      - 'python/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-docs.yml'
      - '.github/workflows/build-unix.yml'
      - '.github/workflows/build-translation.yml'
      - '.readthedocs.yaml'
      - 'NEWS.txt'
      - 'AUTHORS'
      - 'README.md'
      - 'COPYING'
      - 'PRIVACY.md'
      - '.gitignore'
      - 'VERSION.txt'
    branches:
      - master

permissions:
  contents: read

env:
  DEBUG: y
  BOOST: boost_1_87_0

jobs:
  release:
    name: "Create Release"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event.inputs != null && github.event.inputs.ref) || github.ref }}
          submodules: true

      - name: Parse changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=$(echo "${{ github.ref }}" | cut -f3 -d '/')
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "::set-output name=TAG::$TAG"
          echo 'CHANGELOGENTRY<<EOF' >> $GITHUB_ENV
          ./tools/changelog.sh "$TAG" >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
          case "$TAG" in
            *-rc*)
              echo "PRERELEASE=true" >> $GITHUB_ENV
              ;;
            *)
              echo "PRERELEASE=false" >> $GITHUB_ENV
              ;;
          esac
        id: changelogentry

      - name: get XCSoar Version
        id: get_version
        run: |
          VERSION=$(cat VERSION.txt)
          echo "$VERSION"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "::set-output name=VERSION::${VERSION}"

      - name: Create release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          allowUpdates: true
          name: Version ${{ github.ref_name }}
          body: ${{ env.CHANGELOGENTRY }}
          prerelease: ${{ env.PRERELEASE }}

  build:
    runs-on: ${{ matrix.os }}
    needs: release
    permissions:
      contents: write
    # On push/tag, one failed matrix leg (e.g. iOS/macOS) must not block
    # upload-to-play / upload-to-virustotal. PRs keep strict failure.
    continue-on-error: ${{ github.event_name != 'pull_request' }}
    env:
      # Signing uses env.* in if: (secrets.* in if: is invalid). These are booleans.
      IOS_SIGNING_CONFIGURED: ${{ secrets.APPLE_CERTIFICATES_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' && secrets.APPLE_DISTRIBUTION_CERTIFICATE_NAME != '' }}
      MACOS_SIGNING_CONFIGURED: ${{ secrets.APPLE_CERTIFICATES_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.MACOS_PROVISIONING_PROFILE_BASE64 != '' && secrets.APPLE_DISTRIBUTION_CERTIFICATE_NAME != '' && secrets.MACOS_INSTALLER_CERTIFICATE_NAME != '' }}
    container: ${{ matrix.target_container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: UNIX
            target_bin: xcsoar_${{ needs.release.outputs.version }}_amd64
            target_bin_path: ''
            target_final: xcsoar_
            target_ext: .deb
            target_upload: true
            target_container: debian:trixie-slim
          - os: ubuntu-24.04
            target: KOBO
            target_bin: KoboRoot
            target_bin_path: ''
            target_final: KoboRoot
            target_ext: .tgz
            target_upload: true
            target_container: debian:trixie-slim
          - os: ubuntu-24.04
            target: ANDROID
            target_bin: XCSoar
            target_bin_path: bin
            target_final: XCSoar
            target_ext: .apk
            target_upload: true
            ndk: r26d
            target_container: debian:trixie-slim
          - os: ubuntu-24.04
            target: ANDROID_BUNDLE
            target_bin: XCSoar
            target_bin_path: bin
            target_final: XCSoar
            target_ext: .apk
            target_upload: false
            ndk: r26d
            target_container: debian:trixie-slim
          - os: ubuntu-24.04
            target: WIN64
            target_bin: XCSoar
            target_bin_path: bin
            target_final: XCSoar
            target_ext: .exe
            target_upload: true
            target_container: debian:trixie-slim
          - os: ubuntu-24.04
            target: PC
            target_bin: XCSoar
            target_bin_path: bin
            target_final: XCSoar
            target_ext: .exe
            target_upload: true
            target_container: debian:trixie-slim
          - os: macos-26
            target: MACOS
            target_bin: XCSoar
            target_bin_path: ''
            target_final: XCSoar
            target_ext: .dmg
            target_upload: true
            target_container: ''
          - os: macos-26
            target: IOS64
            target_bin: xcsoar-signed
            target_bin_path: ''
            target_final: XCSoar
            target_ext: .ipa
            target_upload: true
            target_container: ''

    steps:
      - name: Install checkout dependencies
        run: |
          if [ "${{ matrix.os }}" = 'ubuntu-24.04' ]; then
            apt-get update
            apt-get install -y --no-install-recommends git \
            ca-certificates rsync openssh-client
          fi

      - name: Set vars for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "DEBUG=n" >> $GITHUB_ENV
          if [ ${{ matrix.target }} = "xcsoar" ]; then
            echo "TARGET_FINAL=xcsoar" >> $GITHUB_ENV
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event.inputs != null && github.event.inputs.ref) || github.ref }}
          submodules: true

      - name: Verify Xcode version
        if: ${{ matrix.target == 'IOS64' }}
        run: |
          xcodebuild -version

      # APK and AAB matrix legs both compile ANDROIDFAT; a single shared key made
      # parallel jobs race on save and duplicate work. Use one key per leg.
      - name: Cache ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.target == 'ANDROID_BUNDLE' && 'ANDROID_BUNDLE-ccache' || (matrix.target == 'ANDROID' && 'ANDROIDFAT-ccache') || format('{0}-ccache', matrix.target) }}
          max-size: 3G

      - name: Configure ccache for cross-compilation
        if: ${{ matrix.target == 'KOBO' || matrix.target == 'ANDROID' || matrix.target == 'ANDROID_BUNDLE' }}
        run: |
          # Configure ccache to ignore compiler path for cross-compilation
          # This is important because cross-compilers have different paths
          # but produce the same output, so we want to cache based on content
          ccache --set-config compiler_check=content
          ccache --set-config hard_link=false

      - name: "Cache common downloads"
        uses: actions/cache@v5
        with:
          key: downloads-common-${{ runner.os }}-${{ hashFiles('build/libboost.mk') }}
          restore-keys: |
            downloads-common-${{ runner.os }}-
          path: ${{ github.workspace }}/output/download

      - name: "Cache target-specific downloads"
        uses: actions/cache@v5
        with:
          key: downloads-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('build/kobo.mk', 'build/thirdparty.py', 'build/python/build/libs.py') }}
          restore-keys: |
            downloads-${{ runner.os }}-${{ matrix.target }}-
            downloads-${{ runner.os }}-
            downloads-common-${{ runner.os }}-
          path: ${{ github.workspace }}/output/download

      - name: "Cache apt packages"
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        uses: actions/cache@v5
        with:
          key: apt-${{ matrix.target_container }}-${{ hashFiles('ide/provisioning/install-debian-packages.sh') }}
          restore-keys: |
            apt-${{ matrix.target_container }}
            apt
          path: /var/cache/apt

      - name: "Cache Homebrew packages"
        if: ${{ startsWith(matrix.os, 'macos-') }}
        uses: actions/cache@v5
        with:
          key: brew-${{ matrix.os }}-${{ hashFiles('ide/provisioning/install-darwin-packages.sh') }}
          restore-keys: |
            brew-${{ matrix.os }}
            brew
          path: |
            /opt/homebrew/var/cache
            /opt/homebrew/var/homebrew/cache
            /usr/local/var/cache
            /usr/local/var/homebrew/cache
            /Users/runner/Library/Caches/Homebrew

      - name: "Cache ANGLE downloads"
        if: ${{ matrix.target == 'MACOS' }}
        uses: actions/cache@v5
        with:
          key: angle-${{ hashFiles('darwin/fetch-angle-from-chrome.sh') }}
          restore-keys: angle-
          path: output/angle-download

      - name: "Cache Boost"
        uses: actions/cache@v5
        with:
          key: ${{ env.BOOST }}-${{ hashFiles('lib/boost/patches/**') }}
          path: |
            ${{ github.workspace }}/output/download/${{ env.BOOST }}.tar.bz2
            ${{ github.workspace }}/output/src/stamp-${{ env.BOOST }}
            ${{ github.workspace }}/output/src/${{ env.BOOST }}/boost

      - name: "Cache Android SDK/NDK"
        if: ${{ matrix.target == 'ANDROID' || matrix.target == 'ANDROID_BUNDLE' }}
        uses: actions/cache@v5
        with:
          key: android-tools-${{ matrix.ndk }}-${{ hashFiles('ide/provisioning/install-android-tools.sh', 'build/android.mk', 'build/android_bundle.mk', 'build/targets.mk') }}
          restore-keys: |
            android-tools-${{ matrix.ndk }}-
            android-tools-
          path: |
            ~/opt/android-sdk-linux
            ~/opt/android-ndk-${{ matrix.ndk }}
            ~/opt/bundletool

      - name: "Cache third-party libraries"
        if: ${{ matrix.target == 'ANDROID' || matrix.target == 'ANDROID_BUNDLE' || matrix.target == 'KOBO' }}
        uses: actions/cache@v5
        with:
          key: thirdparty-${{ matrix.target }}-${{ hashFiles('build/thirdparty.py', 'build/python/build/libs.py', 'build/python/build/project.py', 'build/thirdparty.mk') }}
          restore-keys: |
            thirdparty-${{ matrix.target }}-
          path: |
            ${{ github.workspace }}/output/${{ matrix.target }}/lib

      - name: Install dependencies
        run: |
          if [ ${{ matrix.os }} = 'ubuntu-24.04' ]; then
            ./ide/provisioning/install-debian-packages.sh UPDATE
            ./ide/provisioning/install-debian-packages.sh BASE
            if [ ${{ matrix.target }} = 'UNIX' ]; then
              ./ide/provisioning/install-debian-packages.sh LINUX
              ./ide/provisioning/install-debian-packages.sh LIBINPUT_GBM
              ./ide/provisioning/install-debian-packages.sh DEBIAN
            fi
            if [ ${{ matrix.target }} = 'KOBO' ]; then
              ./ide/provisioning/install-debian-packages.sh LINUX
              ./ide/provisioning/install-debian-packages.sh ARM
              ./ide/provisioning/install-debian-packages.sh KOBO
            fi
            if [ ${{ matrix.target }} = 'WIN64' ]; then
              ./ide/provisioning/install-debian-packages.sh LINUX
              ./ide/provisioning/install-debian-packages.sh WIN
            fi
            if [ ${{ matrix.target }} = 'PC' ]; then
              ./ide/provisioning/install-debian-packages.sh LINUX
              ./ide/provisioning/install-debian-packages.sh WIN
            fi
            if [ ${{ matrix.target }} = 'ANDROID' ] || [ ${{ matrix.target}} = 'ANDROID_BUNDLE' ]; then
              ./ide/provisioning/install-debian-packages.sh LINUX
              ./ide/provisioning/install-debian-packages.sh ARM
              ./ide/provisioning/install-debian-packages.sh LLVM
              ./ide/provisioning/install-debian-packages.sh ANDROID
              ./ide/provisioning/install-android-tools.sh NDK
              ./ide/provisioning/install-android-tools.sh SDK
              ./ide/provisioning/install-android-tools.sh BUNDLETOOL
            fi
            ./ide/provisioning/install-debian-packages.sh CLEAN
          elif [ ${{ matrix.os }} = 'macos-12' ] ; then
            ./ide/provisioning/install-darwin-packages.sh BASE
            if [ ${{ matrix.target }} = 'OSX64' ]; then
              ./ide/provisioning/install-darwin-packages.sh OSX64
            fi
          elif [ ${{ matrix.os }} = 'macos-14' ] || [ ${{ matrix.os }} = 'macos-15' ] || [ ${{ matrix.os }} = 'macos-26' ] ; then
            ./ide/provisioning/install-darwin-packages.sh BASE
            if [ ${{ matrix.target }} = 'MACOS' ]; then
              ./ide/provisioning/install-darwin-packages.sh MACOS
            elif [ ${{ matrix.target }} = 'IOS64' ]; then
              ./ide/provisioning/install-darwin-packages.sh IOS
            fi
          fi
          echo "git_hash=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_ENV

      - name: Prepare signing key
        shell: bash
        if: ${{ (matrix.target == 'ANDROID' || matrix.target == 'ANDROID_BUNDLE') && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master') }}
        run: |
          if [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_BASE64 }}" ]; then
            mkdir -p ~/.android/
            echo "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_BASE64 }}" | base64 -d > ~/.android/signing-key.jks
            md5sum ~/.android/signing-key.jks
          fi

      - name: Set Android version for master and tags
        if: ${{ (matrix.target == 'ANDROID' || matrix.target == 'ANDROID_BUNDLE') && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
        shell: bash
        run: |
          if [ "${GITHUB_REF#refs/tags/v}" != "${GITHUB_REF}" ]; then
            VERSION_RAW="${GITHUB_REF#refs/tags/v}"
          else
            VERSION_RAW="$(tr -d '\n' < VERSION.txt)"
          fi

          VERSION_CORE="${VERSION_RAW%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH EXTRA <<< "$VERSION_CORE"
          PATCH="${PATCH:-0}"

          if [ -n "$EXTRA" ] || [ -z "$MAJOR" ] || [ -z "$MINOR" ] ||
             [ -z "$PATCH" ]; then
            echo "Invalid Android version source: '$VERSION_RAW'"
            exit 1
          fi

          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ &&
                 "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "Invalid Android semantic version: '$VERSION_RAW'"
            exit 1
          fi

          if [ "${GITHUB_REF#refs/tags/v}" != "${GITHUB_REF}" ]; then
            BUILD=0
          else
            BUILD="${GITHUB_RUN_NUMBER}"
            if [ "$BUILD" -gt 9999 ]; then
              echo "Internal testing build slot overflow: run $BUILD > 9999"
              exit 1
            fi
          fi

          VERSION_CODE=$((MAJOR * 10000000 + MINOR * 100000 +
                          PATCH * 10000 + BUILD))
          VERSION_NAME="${MAJOR}.${MINOR}"
          if [ "$PATCH" -ne 0 ]; then
            VERSION_NAME="${VERSION_NAME}.${PATCH}"
          fi

          sed -i \
            -e "s/android:versionCode=\"[0-9][0-9]*\"/android:versionCode=\"${VERSION_CODE}\"/" \
            -e "s/android:versionName=\"[^\"]*\"/android:versionName=\"${VERSION_NAME}\"/" \
            android/AndroidManifest.xml.template

          echo "Android versionName=${VERSION_NAME} versionCode=${VERSION_CODE}"

      - name: Prepare iOS signing certificate and provisioning profile
        shell: bash
        if: ${{ matrix.target == 'IOS64' && env.IOS_SIGNING_CONFIGURED == 'true' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
        run: |
          echo "${{ secrets.APPLE_CERTIFICATES_BASE64 }}" | base64 -d > ios-cert.p12

          security create-keychain -p actions ios-build.keychain
          security default-keychain -s ios-build.keychain
          security unlock-keychain -p actions ios-build.keychain
          security set-keychain-settings -t 3600 -u ios-build.keychain

          security import ios-cert.p12 -k ios-build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k actions ios-build.keychain

          rm ios-cert.p12
          echo "iOS certificate imported successfully"

          mkdir -p darwin
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > darwin/xcsoar.mobileprovision
          echo "iOS provisioning profile installed successfully"

      - name: Prepare macOS signing certificate and provisioning profile
        shell: bash
        if: ${{ matrix.target == 'MACOS' && env.MACOS_SIGNING_CONFIGURED == 'true' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
        run: |
          echo "${{ secrets.APPLE_CERTIFICATES_BASE64 }}" | base64 -d > macos-cert.p12

          security create-keychain -p actions macos-build.keychain
          security default-keychain -s macos-build.keychain
          security unlock-keychain -p actions macos-build.keychain
          security set-keychain-settings -t 3600 -u macos-build.keychain

          security import macos-cert.p12 -k macos-build.keychain \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild

          security set-key-partition-list -S apple-tool:,apple: -s -k actions macos-build.keychain

          rm macos-cert.p12
          echo "macOS certificate imported successfully"

          mkdir -p darwin
          echo "${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > darwin/xcsoar.macos.provisionprofile
          echo "macOS provisioning profile installed successfully"

      - name: Compile XCSoar - PR
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if [ ${{ matrix.target }} = "IOS64" ]; then
            export IOS_APP_BUNDLE_IDENTIFIER="${{ vars.IOS_APP_BUNDLE_IDENTIFIER || 'org.xcsoar.XCSoar' }}"
            export IOS_APP_BUILD_NUMBER="${{ vars.IOS_APP_BUILD_NUMBER || github.run_number }}"
            export IOS_PATCH_VERSION="${{ vars.IOS_PATCH_VERSION || 0 }}"
          fi
          if [ ${{ matrix.target }} = "MACOS" ]; then
            export MACOS_APP_BUNDLE_IDENTIFIER="${{ vars.MACOS_APP_BUNDLE_IDENTIFIER || 'org.xcsoar.XCSoar' }}"
            export MACOS_APP_BUILD_NUMBER="${{ vars.MACOS_APP_BUILD_NUMBER || github.run_number }}"
            export MACOS_PATCH_VERSION="${{ vars.MACOS_PATCH_VERSION || 0 }}"
          fi
          if [ ${{ matrix.target }} = 'ANDROID' ] || [ ${{ matrix.target }} = "ANDROID_BUNDLE" ]; then
            if [ "${{ matrix.target }}" = "ANDROID_BUNDLE" ]; then
              BUNDLE=y
              PLAY=y
            fi
            if [ "${{ github.ref }}" = "refs/heads/master" ] &&
               [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_BASE64 }}" ] &&
               [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }}" ] &&
               [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}" ]; then
              ANDROID_KEYSTORE_PASS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }} \
              make -j$(nproc) ANDROID_BUNDLE_BUILD="$BUNDLE" PLAY="$PLAY" TARGET=ANDROIDFAT DEBUG=n USE_CCACHE=y V=2 \
              output/${{ matrix.target }}/bin/${{ matrix.target_bin }}${{ matrix.target_ext }} \
              output/${{ matrix.target }}/symbols.zip \
              ANDROID_KEYSTORE=$(eval echo ~)/.android/signing-key.jks ANDROID_KEY_ALIAS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}
            else
              make -j$(nproc) ANDROID_BUNDLE_BUILD="$BUNDLE" PLAY="$PLAY" TARGET=ANDROIDFAT DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 \
              output/${{ matrix.target }}/bin/${{ matrix.target_bin }}-debug${{ matrix.target_ext }} \
              output/${{ matrix.target }}/symbols.zip
              mv output/${{ matrix.target }}/bin/${{ matrix.target_bin }}-debug${{ matrix.target_ext }} \
              output/${{ matrix.target }}/bin/${{ matrix.target_bin }}${{ matrix.target_ext }}
              if [ "${{ matrix.target }}" = "ANDROID_BUNDLE" ]; then
                mv output/${{ matrix.target }}/bin/${{ matrix.target_bin }}-debug.aab \
                output/${{ matrix.target }}/bin/${{ matrix.target_bin }}.aab
              fi
            fi
          elif [ ${{ matrix.target }} = "WIN64" ]; then
            make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything
          elif [ ${{ matrix.target }} = "PC" ]; then
            make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything
          elif [ ${{ matrix.target }} = "KOBO" ]; then
            make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 output/${{ matrix.target }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          elif [ ${{ matrix.target }} = "OSX64" ]; then
            gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 OPTIMIZE="-O0"
          elif [ ${{ matrix.target }} = "MACOS" ]; then
            gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 TESTING=y OPTIMIZE="-O0" dmg pkg
          elif [ ${{ matrix.target }} = "IOS64" ]; then
            gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 TESTING=y OPTIMIZE="-O0" ipa
          elif [ ${{ matrix.target }} = "UNIX" ]; then
            mkdir -p output/UNIX/DPKG
            rsync -apt . output/UNIX/DPKG --exclude=output/UNIX/DPKG
            cd output/UNIX/DPKG
            DEB_BUILD_OPTIONS=ccache,noopt dpkg-buildpackage --jobs-force=$(nproc) --no-sign
          fi

      - name: Compile XCSoar - Sanitizer Check
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          if [ ${{ matrix.target }} = "UNIX" ]; then
            make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything check VFB=y SANITIZE=y DEBUG_GLIBCXX=y
          fi

      - name: Compile XCSoar - Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ ${{ matrix.target }} = "IOS64" ]; then
            export IOS_APP_BUNDLE_IDENTIFIER="${{ vars.IOS_APP_BUNDLE_IDENTIFIER || 'org.xcsoar.XCSoar' }}"
            export IOS_APP_BUILD_NUMBER="${{ vars.IOS_APP_BUILD_NUMBER || github.run_number }}"
            export IOS_PATCH_VERSION="${{ vars.IOS_PATCH_VERSION || 0 }}"
          fi
          if [ ${{ matrix.target }} = "MACOS" ]; then
            export MACOS_APP_BUNDLE_IDENTIFIER="${{ vars.MACOS_APP_BUNDLE_IDENTIFIER || 'org.xcsoar.XCSoar' }}"
            export MACOS_APP_BUILD_NUMBER="${{ vars.MACOS_APP_BUILD_NUMBER || github.run_number }}"
            export MACOS_PATCH_VERSION="${{ vars.MACOS_PATCH_VERSION || 0 }}"
          fi
          if [ ${{ matrix.target }} = 'ANDROID' ] || [ ${{ matrix.target }} = "ANDROID_BUNDLE" ]; then
            if [ "${{ matrix.target }}" = "ANDROID_BUNDLE" ]; then
              BUNDLE=y
              PLAY=y
            fi
            if [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }}" ] && [ -n "${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}" ]; then
              ANDROID_KEYSTORE_PASS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_PASSWORD }} \
              make -j$(nproc) ANDROID_BUNDLE_BUILD="$BUNDLE" PLAY="$PLAY" TARGET=ANDROIDFAT DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 \
              output/${{ matrix.target }}/bin/${{ matrix.target_bin }}${{ matrix.target_ext }} \
              output/${{ matrix.target }}/symbols.zip \
              ANDROID_KEYSTORE=$(eval echo ~)/.android/signing-key.jks ANDROID_KEY_ALIAS=${{ secrets.XCSOAR_UPLOAD_KEY_JKS_KEY_ALIAS }}
            else
              make -j$(nproc) ANDROID_BUNDLE_BUILD="$BUNDLE" PLAY="$PLAY" TARGET=ANDROIDFAT DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 \
              output/${{ matrix.target }}/bin/${{ matrix.target_bin }}${{ matrix.target_ext }} \
              output/${{ matrix.target }}/symbols.zip
            fi
          elif [ ${{ matrix.target }} = "WIN64" ]; then
            make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything
          elif [ ${{ matrix.target }} = "PC" ]; then
            make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 everything
          elif [ ${{ matrix.target }} = "KOBO" ]; then
            make -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 output/${{ matrix.target }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          elif [ ${{ matrix.target }} = "OSX64" ]; then
            gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 OPTIMIZE="-O0" dmg pkg
          elif [ ${{ matrix.target }} = "MACOS" ]; then
            gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 dmg pkg
          elif [ ${{ matrix.target }} = "IOS64" ]; then
            # Set iOS app configuration for production release builds
            export IOS_APP_BUNDLE_IDENTIFIER="${{ vars.IOS_APP_BUNDLE_IDENTIFIER || 'org.xcsoar.XCSoar' }}"
            export IOS_APP_BUILD_NUMBER="${{ vars.IOS_APP_BUILD_NUMBER || github.run_number }}"
            export IOS_PATCH_VERSION="${{ vars.IOS_PATCH_VERSION || 0 }}"
            if [ -n "${{ vars.IOS_APP_VERSION }}" ]; then
              export IOS_APP_VERSION="${{ vars.IOS_APP_VERSION }}"
            fi
            
            echo "Building production release version with TESTING=n"
            
            # Build the IPA without TESTING (production release)
            gmake -j$(nproc) TARGET=${{ matrix.target }} DEBUG=${{ env.DEBUG }} USE_CCACHE=y V=2 TESTING=n ipa
          elif [ ${{ matrix.target }} = "UNIX" ]; then
            mkdir -p output/UNIX/DPKG
            rsync -apt . output/UNIX/DPKG --exclude=output/UNIX/DPKG
            cd output/UNIX/DPKG
            DEB_BUILD_OPTIONS=ccache dpkg-buildpackage --jobs-force=$(nproc) --no-sign
          fi

      - name: Run tests before signing
        id: tests
        if: ${{ (matrix.target == 'IOS64' || matrix.target == 'MACOS') && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
        run: |
          echo "Running unit tests..."
          if [ ${{ matrix.target }} = 'IOS64' ]; then
            gmake check-ios-sim
          else
            gmake TARGET=MACOS check
          fi

      - name: Sign iOS IPA
        id: sign_ios
        if: ${{ matrix.target == 'IOS64' && env.IOS_SIGNING_CONFIGURED == 'true' && steps.tests.outcome == 'success' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
        run: |
          export APPLE_DISTRIBUTION_CERTIFICATE_NAME="${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_NAME }}"
          export IOS_PROFILE_PATH="darwin/xcsoar.mobileprovision"

          echo "Signing iOS IPA..."
          bash darwin/sign.sh

          if [ ! -f "output/IOS64/xcsoar-signed.ipa" ]; then
            echo "Signed iOS IPA not found after signing"
            exit 1
          fi

          echo "iOS IPA signed successfully"

      - name: Sign macOS package
        id: sign_macos
        if: ${{ matrix.target == 'MACOS' && env.MACOS_SIGNING_CONFIGURED == 'true' && steps.tests.outcome == 'success' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_NAME: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_NAME }}
          MACOS_INSTALLER_CERTIFICATE_NAME: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_NAME }}
          MACOS_PROFILE_PATH: darwin/xcsoar.macos.provisionprofile
        run: |
          echo "Signing macOS package..."
          bash darwin/sign-macos.sh

          if [ ! -f "output/MACOS/XCSoar-signed.pkg" ]; then
            echo "Signed macOS package not found after signing"
            exit 1
          fi

          echo "macOS package signed successfully"

      - name: Upload artifact for TestFlight (iOS)
        if: ${{ matrix.target == 'IOS64' && steps.tests.outcome == 'success' && steps.sign_ios.outcome == 'success' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
        uses: actions/upload-artifact@v7
        with:
          name: ios-testflight-ipa
          path: output/IOS64/xcsoar-signed.ipa

      - name: Upload artifact for TestFlight (macOS)
        if: ${{ matrix.target == 'MACOS' && steps.tests.outcome == 'success' && steps.sign_macos.outcome == 'success' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
        uses: actions/upload-artifact@v7
        with:
          name: macos-testflight-pkg
          path: output/MACOS/XCSoar-signed.pkg

      - name: Cleanup iOS keychain
        if: ${{ always() && matrix.target == 'IOS64' }}
        run: |
          security delete-keychain ios-build.keychain || true

      - name: Cleanup macOS keychain
        if: ${{ always() && matrix.target == 'MACOS' }}
        run: |
          security delete-keychain macos-build.keychain || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target_final }}-${{ env.git_hash }}${{ matrix.target }}${{ matrix.target_ext }}
          path: output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}${{ matrix.target_ext }}

      - name: Upload artifact (Bundle)
        uses: actions/upload-artifact@v7
        if: ${{ matrix.target == 'ANDROID_BUNDLE' }}
        with:
          name: android-bundle
          path: |
            output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}.aab
            output/${{ matrix.target }}/symbols.zip

      - name: Upload artifact for VirusTotal (Win64)
        if: ${{ github.repository == 'XCSoar/XCSoar' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && matrix.target == 'WIN64' }}
        uses: actions/upload-artifact@v7
        with:
          name: virustotal-win64
          path: output/WIN64/bin/XCSoar.exe

      - name: Upload artifact for VirusTotal (PC)
        if: ${{ github.repository == 'XCSoar/XCSoar' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && matrix.target == 'PC' }}
        uses: actions/upload-artifact@v7
        with:
          name: virustotal-pc
          path: output/PC/bin/XCSoar.exe

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        if: ${{ startsWith(github.ref, 'refs/tags/v') && matrix.target_upload == true && needs.release.outputs.upload_url != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: output/${{ matrix.target }}/${{ matrix.target_bin_path }}/${{ matrix.target_bin }}${{ matrix.target_ext }}
          asset_name: ${{ matrix.target_final }}-${{ matrix.target }}${{ matrix.target_ext }}
          asset_content_type: application/zip

      - name: Choose iOS deploy artifact
        if: ${{ matrix.target == 'IOS64' }}
        run: |
          SIGNED_IPA="output/IOS64/xcsoar-signed.ipa"
          UNSIGNED_IPA="output/IOS64/xcsoar.ipa"
          if [ -f "$SIGNED_IPA" ]; then
            echo "DEPLOY_SOURCE=$SIGNED_IPA" >> $GITHUB_ENV
          elif [ "${{ env.IOS_SIGNING_CONFIGURED }}" != "true" ] && \
               { [ "${{ github.ref }}" = "refs/heads/master" ] || \
                 [ "${{ github.ref }}" = "refs/heads/apple-testing" ] || \
                 [[ "${{ github.ref }}" == refs/tags/v* ]]; }; then
            if [ -f "$UNSIGNED_IPA" ]; then
              echo "::warning::iOS signing secrets not fully configured; deploying unsigned IPA"
              echo "DEPLOY_SOURCE=$UNSIGNED_IPA" >> $GITHUB_ENV
            else
              echo "Unsigned IPA not found: $UNSIGNED_IPA"
              exit 1
            fi
          elif [ "${{ github.ref }}" = "refs/heads/master" ] || \
               [ "${{ github.ref }}" = "refs/heads/apple-testing" ] || \
               [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "Signed IPA required for ${{ github.ref }} when signing is configured, but not found: $SIGNED_IPA"
            exit 1
          else
            echo "DEPLOY_SOURCE=$UNSIGNED_IPA" >> $GITHUB_ENV
          fi

      - name: Deploy to Download server - testing
        if: ${{ github.repository == 'XCSoar/XCSoar' && github.ref == 'refs/heads/master' }}
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REPOSITORY_SSH_KEY }}
          ARGS: "-rltgoDzvO"
          SOURCE: ${{ env.DEPLOY_SOURCE || format('output/{0}/{1}/{2}{3}', matrix.target, matrix.target_bin_path, matrix.target_bin, matrix.target_ext) }}
          REMOTE_HOST: ${{ secrets.REPOSITORY_HOST }}
          REMOTE_USER: ${{ secrets.REPOSITORY_SSH_USER }}
          TARGET: ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}/
          SCRIPT_BEFORE: mkdir -p ${{ secrets.REPOSITORY_REMOTE_PATH }}/testing/${{ matrix.target }}

      - name: Deploy to Download server - release
        if: ${{ github.repository == 'XCSoar/XCSoar' && startsWith(github.ref, 'refs/tags/v') && matrix.target_upload == true }}
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.REPOSITORY_SSH_KEY }}
          ARGS: "-rltgoDzvO"
          SOURCE: ${{ env.DEPLOY_SOURCE || format('output/{0}/{1}/{2}{3}', matrix.target, matrix.target_bin_path, matrix.target_bin, matrix.target_ext) }}
          REMOTE_HOST: ${{ secrets.REPOSITORY_HOST }}
          REMOTE_USER: ${{ secrets.REPOSITORY_SSH_USER }}
          TARGET: ${{ secrets.REPOSITORY_REMOTE_PATH }}/releases/${{ needs.release.outputs.version }}/${{ matrix.target }}/
          SCRIPT_BEFORE: mkdir -p ${{ secrets.REPOSITORY_REMOTE_PATH }}/releases/${{ needs.release.outputs.version }}/${{ matrix.target }}/

      - name: Show ccache stats
        run: ccache --show-stats || true

  upload-to-play:
    name: Upload to Google Play
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.repository == 'XCSoar/XCSoar' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ (github.event.inputs != null && github.event.inputs.ref) || github.ref }}
          submodules: true

      - name: Download Android bundle
        uses: actions/download-artifact@v8
        with:
          name: android-bundle
          # upload-artifact uses the least common ancestor of the uploaded paths
          # (output/ANDROID_BUNDLE/) as the artifact root, so the zip contains
          # bin/XCSoar.aab and symbols.zip — not output/ANDROID_BUNDLE/...
          path: android-bundle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Create Play Store key
        run: |
          printf '%s' "$GOOGLE_PLAY_JSON_KEY" > play-key.json
          chmod 600 play-key.json
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}

      - name: Upload AAB and metadata to Play Store
        run: |
          # Release = version tag v* (same idea as elsewhere in this workflow): production.
          # Non-release (master pushes, other tags, manual branch builds): internal.
          EVENT_NAME="${{ github.event_name }}"
          GITHUB_REF_VAL="${{ github.ref }}"
          REF_INPUT="${{ github.event.inputs.ref }}"
          if [[ "$GITHUB_REF_VAL" == refs/tags/v* ]]; then
            PLAY_TRACK=production
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]] && [[ -n "$REF_INPUT" ]]; then
            case "$REF_INPUT" in
              refs/tags/v*|v*) PLAY_TRACK=production ;;
              *) PLAY_TRACK=internal ;;
            esac
          else
            PLAY_TRACK=internal
          fi
          echo "Play track: $PLAY_TRACK (ref=$GITHUB_REF_VAL, dispatch ref=$REF_INPUT)"

          # Paths under android-bundle/ match the artifact layout (see Download step).
          AAB_PATH="android-bundle/bin/XCSoar.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "AAB not found at $AAB_PATH (expected download layout for artifact android-bundle)"
            exit 1
          fi
          echo "Using AAB at: $AAB_PATH"
          SYMBOLS_ZIP="android-bundle/symbols.zip"
          MAPPING_PATH=""
          if [ -f "$SYMBOLS_ZIP" ]; then
            MAPPING_PATH="$SYMBOLS_ZIP"
            echo "Uploading native debug symbols: $MAPPING_PATH"
          else
            echo "::warning::Native debug symbols not found at $SYMBOLS_ZIP (expected CI artifact layout); Play native stacks may stay obfuscated"
          fi
          fastlane supply \
            --package_name org.xcsoar.play \
            --aab "$AAB_PATH" \
            ${MAPPING_PATH:+--mapping "$MAPPING_PATH"} \
            --metadata_path fastlane/metadata/android \
            --json_key play-key.json \
            --track "$PLAY_TRACK" \
            --skip_upload_changelogs true

      - name: Remove key
        if: always()
        run: rm -f play-key.json

  upload-to-testflight:
    name: Upload to TestFlight (iOS / macOS)
    runs-on: macos-26
    needs: [build]
    if: ${{ (github.repository == 'XCSoar/XCSoar' || github.repository == 'yorickreum/XCSoar') && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/apple-testing' || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - name: Download iOS IPA
        id: ios_ipa
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: ios-testflight-ipa

      - name: Download macOS PKG
        id: macos_pkg
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: macos-testflight-pkg

      - name: Upload iOS to App Store Connect / TestFlight
        if: steps.ios_ipa.outcome == 'success'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
        run: |
          IPA_PATH=""
          for candidate in \
            "ios-testflight-ipa/output/IOS64/xcsoar-signed.ipa" \
            "ios-testflight-ipa/xcsoar-signed.ipa" \
            "xcsoar-signed.ipa"; do
            if [ -f "$candidate" ]; then
              IPA_PATH="$candidate"
              break
            fi
          done
          if [ -z "$IPA_PATH" ]; then
            echo "Signed IPA not found after download"
            exit 1
          fi
          echo "Using IPA at: $IPA_PATH"

          if [ -z "$APPLE_ID" ] || [ -z "$APP_SPECIFIC_PASSWORD" ]; then
            echo "TestFlight credentials not configured"
            exit 1
          fi

          echo "Uploading iOS build to App Store Connect / TestFlight..."
          if [ -n "$ASC_PROVIDER" ]; then
            xcrun altool --upload-app \
              -f "$IPA_PATH" \
              -t ios \
              -u "$APPLE_ID" \
              -p "$APP_SPECIFIC_PASSWORD" \
              --asc-provider "$ASC_PROVIDER"
          else
            xcrun altool --upload-app \
              -f "$IPA_PATH" \
              -t ios \
              -u "$APPLE_ID" \
              -p "$APP_SPECIFIC_PASSWORD"
          fi

      - name: Upload macOS to App Store Connect / TestFlight
        if: steps.macos_pkg.outcome == 'success'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          ASC_PROVIDER: ${{ secrets.ASC_PROVIDER }}
        run: |
          PKG_PATH=""
          for candidate in \
            "macos-testflight-pkg/output/MACOS/XCSoar-signed.pkg" \
            "macos-testflight-pkg/XCSoar-signed.pkg" \
            "XCSoar-signed.pkg"; do
            if [ -f "$candidate" ]; then
              PKG_PATH="$candidate"
              break
            fi
          done
          if [ -z "$PKG_PATH" ]; then
            echo "Signed pkg not found after download"
            exit 1
          fi
          echo "Using pkg at: $PKG_PATH"

          if [ -z "$APPLE_ID" ] || [ -z "$APP_SPECIFIC_PASSWORD" ]; then
            echo "App Store Connect credentials not configured"
            exit 1
          fi

          echo "Uploading macOS build to App Store Connect / TestFlight..."
          if [ -n "$ASC_PROVIDER" ]; then
            xcrun altool --upload-app \
              -f "$PKG_PATH" \
              -t macos \
              -u "$APPLE_ID" \
              -p "$APP_SPECIFIC_PASSWORD" \
              --asc-provider "$ASC_PROVIDER"
          else
            xcrun altool --upload-app \
              -f "$PKG_PATH" \
              -t macos \
              -u "$APPLE_ID" \
              -p "$APP_SPECIFIC_PASSWORD"
          fi

      - name: No TestFlight artifacts from build
        if: ${{ steps.ios_ipa.outcome != 'success' && steps.macos_pkg.outcome != 'success' }}
        run: |
          echo "::warning::No iOS or macOS TestFlight artifacts from the build job; skipping TestFlight uploads."

  upload-to-virustotal:
    name: Upload to VirusTotal (Windows)
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.repository == 'XCSoar/XCSoar' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) }}
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - name: Download Win64 executable
        id: win64
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: virustotal-win64

      - name: Download PC executable
        id: pc
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: virustotal-pc

      - name: Prepare files for VirusTotal
        run: |
          mkdir -p vt-scan
          # download-artifact@v8 extracts into workspace root with the same
          # paths as upload (not under a virustotal-* directory).
          for c in \
            output/WIN64/bin/XCSoar.exe \
            virustotal-win64/output/WIN64/bin/XCSoar.exe \
            virustotal-win64/XCSoar.exe; do
            if [ -f "$c" ]; then
              cp "$c" vt-scan/XCSoar-WIN64.exe
              break
            fi
          done
          for c in \
            output/PC/bin/XCSoar.exe \
            virustotal-pc/output/PC/bin/XCSoar.exe \
            virustotal-pc/XCSoar.exe; do
            if [ -f "$c" ]; then
              cp "$c" vt-scan/XCSoar-PC.exe
              break
            fi
          done
          n=0
          for f in vt-scan/XCSoar-WIN64.exe vt-scan/XCSoar-PC.exe; do
            [ -f "$f" ] && n=$((n + 1))
          done
          if [ "$n" -eq 0 ]; then
            echo "No Windows executables found for VirusTotal"
            exit 1
          fi
          ls -la vt-scan/

      - name: VirusTotal scan
        if: ${{ env.VT_API_KEY != '' }}
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ env.VT_API_KEY }}
          request_rate: 4
          files: |
            vt-scan/*.exe

      - name: VirusTotal API key not configured
        if: ${{ env.VT_API_KEY == '' }}
        run: |
          echo "::warning::VT_API_KEY is not set; skipping VirusTotal upload."
